<!DOCTYPE html>
<html>
<head>
<title>Pantanan Order QR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="qr-shell">
<div class="qr-card">
<h3>Pantanan Food Kiosk</h3>
<p class="qr-subtitle">University of San Agustin</p>
<p>Scan to open the customer preorder menu.</p>
<img id="orderQr" class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=14&data=https%3A%2F%2Fpantanan-preorder.onrender.com%2F" alt="Pantanan preorder QR">
<p id="qrTarget" class="qr-target">https://pantanan-preorder.onrender.com/</p>
<a id="orderLink" class="qr-link" href="https://pantanan-preorder.onrender.com/" target="_blank" rel="noreferrer">Open Order Menu</a>
</div>
</div>

<script src="/qr.js"></script>
</body>
</html>
