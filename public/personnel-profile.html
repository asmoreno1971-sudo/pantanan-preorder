<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Personnel Profile | Bakhaw Integrated School</title>
<meta name="theme-color" content="#0c6842">
<link rel="manifest" href="/learner-manifest.webmanifest">
<link rel="icon" href="/bakhaw-school-logo.png">
<link rel="stylesheet" href="/personnel-profile.css?v=20260617-sex-birthday-controls">
<link rel="stylesheet" href="/teacher-session.css?v=20260615-guidance-pin-gate">
</head>
<body>
<main class="profile-shell">
  <header class="profile-header">
    <div class="brand">
      <img src="/bakhaw-school-logo.png" alt="Bakhaw Integrated School logo">
      <div>
        <p>Bakhaw Integrated School</p>
        <h1>Personnel Profile</h1>
        <span>Individual personnel information sheet</span>
      </div>
    </div>
    <nav class="header-actions" aria-label="Personnel profile navigation">
      <a href="/personnel">Personnel Consol</a>
      <a href="/student-dashboard">Dashboard</a>
      <a href="/students">Learner Profile</a>
      <button type="button" data-teacher-logout>Logout</button>
    </nav>
  </header>

  <section class="profile-panel">
    <div class="panel-heading">
      <div>
        <p>Personnel data</p>
        <h2>Personnel Profile</h2>
      </div>
      <strong id="profileSyncStatus">Saved profiles will appear immediately.</strong>
    </div>

    <form id="personnelProfileForm" class="profile-form">
      <section class="form-section">
        <h3>Personnel Name</h3>
        <label>
          <input id="personnelName" name="name" type="text" readonly required placeholder="Logged-in teacher name">
        </label>
      </section>
      <div id="dynamicProfileFields" class="dynamic-profile-fields"></div>

      <div class="form-actions">
        <button type="submit" id="saveProfileButton">Save Profile</button>
        <button type="button" id="clearProfileButton" class="secondary">Clear Form</button>
      </div>
      <p id="profileFormMessage" class="form-message" role="status"></p>
    </form>
  </section>
</main>

<script src="/learner-offline.js?v=20260615-guidance-pin-gate"></script>
<script src="/teacher-session.js?v=20260616-current-teacher"></script>
<script src="/personnel-profile.js?v=20260617-date-picker-fields"></script>
</body>
</html>
