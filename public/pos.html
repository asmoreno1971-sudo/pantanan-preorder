<!DOCTYPE html>
<html lang="en">
<head>
<title>POS RW</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/pos.css">
</head>
<body>
<header class="topbar">
  <div>
    <p class="eyebrow">Sandwiched</p>
    <h1>POS RW</h1>
  </div>
  <div class="clock" id="datetime"></div>
</header>

<main class="pos-shell">
  <section class="catalog" aria-label="Products">
    <div id="products" class="products"></div>
  </section>

  <aside class="ticket" aria-label="Order Summary">
    <div class="ticket-head">
      <h2>Order Summary</h2>
      <button class="ghost-btn" id="clearBtn" type="button">Clear</button>
    </div>

    <div id="cart" class="cart empty">No items yet</div>

    <div class="total-row">
      <span>Total</span>
      <strong id="total">₱0</strong>
    </div>

    <div class="actions">
      <button class="save" id="saveBtn" type="button">Save Transaction</button>
      <button class="cancel" id="cancelLastBtn" type="button">Cancel Last</button>
    </div>

    <p class="status" id="status" role="status"></p>
  </aside>
</main>

<script src="/pos.js"></script>
</body>
</html>
