name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm customer page
        run: |
          curl --silent --show-error --fail --max-time 20 --retry 2 https://pantanan-preorder.onrender.com/ >/dev/null
          curl --silent --show-error --fail --max-time 20 --retry 2 "https://pantanan-preorder.onrender.com/api/menu?view=customer" >/dev/null
