<!DOCTYPE html>
<html>
<head>
<title>Teacher Profile | Bakhaw Integrated School</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/styles.css?v=20260523-teacher-profile-fields">
</head>
<body class="teacher-profile-body">
<main class="teacher-profile">
<section class="teacher-hero">
<div class="school-mark" aria-hidden="true">BIS</div>
<div>
<p class="school-name">Bakhaw Integrated School</p>
<h1>Teacher Profile</h1>
<p class="teacher-intro">Dedicated to learner-centered teaching, character formation, and a safe classroom where every learner is encouraged to participate and grow.</p>
</div>
</section>

<section class="teacher-card teacher-sheet">
<h2>Personal Information</h2>
<div class="teacher-field-grid">
<label>Family Name<input type="text" data-format="proper"></label>
<label>First Name<input type="text" data-format="proper"></label>
<label>Middle Name<input type="text" data-format="proper"></label>
<label>Birthday<input type="date"></label>
<label>Sex<select><option value="">Select</option><option>Female</option><option>Male</option></select></label>
<label>School Year<input type="text" placeholder="2026-2027"></label>
</div>
</section>

<section class="teacher-card teacher-sheet">
<h2>Education and Teaching Assignment</h2>
<div class="teacher-field-grid">
<label>Highest Educational Attainment<input type="text" data-format="proper"></label>
<label>Major in<input type="text" data-format="proper"></label>
<label>Subject/s Taught<input type="text" data-format="proper"></label>
<label>Grade Level / Advisory<input type="text" data-format="proper"></label>
<label>Position<input type="text" placeholder="Teacher" data-format="proper"></label>
<label>Department<input type="text" data-format="proper"></label>
</div>
</section>

<section class="teacher-card teacher-sheet">
<h2>Government and Employee IDs</h2>
<div class="teacher-field-grid id-grid">
<label>Employee No.<input type="text" data-format="upper"></label>
<label>GSIS<input type="text" data-format="upper"></label>
<label>PhilHealth<input type="text" data-format="upper"></label>
<label>TIN<input type="text" data-format="upper"></label>
<label>SSS<input type="text" data-format="upper"></label>
<label>PAG-IBIG<input type="text" data-format="upper"></label>
<label>PRC License No.<input type="text" data-format="upper"></label>
<label>DepEd Email<input type="email" data-format="lower"></label>
</div>
</section>
</main>
<script>
function toProperCase(value){
  return value
    .toLowerCase()
    .replace(/\b[a-z]/g, letter => letter.toUpperCase())
    .replace(/\s+/g, " ")
    .trimStart();
}

document.querySelectorAll("input[data-format]").forEach(input=>{
  input.addEventListener("blur", ()=>{
    const mode = input.dataset.format;

    if(mode === "proper"){
      input.value = toProperCase(input.value);
    }else if(mode === "upper"){
      input.value = input.value.toUpperCase().trim();
    }else if(mode === "lower"){
      input.value = input.value.toLowerCase().trim();
    }
  });
});
</script>
</body>
</html>
