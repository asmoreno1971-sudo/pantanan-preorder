<!DOCTYPE html>
<html>
<head>
<title>Pantanan Messenger QR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="qr-shell">
<div class="qr-card">
<h3>Pantanan Food Kiosk</h3>
<p class="qr-subtitle">University of San Agustin</p>
<p>Scan to message us on WhatsApp.</p>
<img id="messengerQr" class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=14&data=https%3A%2F%2Fwa.me%2F639695093050" alt="Pantanan WhatsApp QR">
<p id="qrTarget" class="qr-target">https://wa.me/639695093050</p>
<a id="messengerLink" class="qr-link" href="https://wa.me/639695093050" target="_blank" rel="noreferrer">Open WhatsApp</a>
</div>
</div>

<script src="/qr.js"></script>
</body>
</html>
