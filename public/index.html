<!DOCTYPE html>
<html>
<head>
<title>Preorder Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/styles.css?v=20260516-customer-panel">
</head>
<body>
<div class="page">
<div class="main">
<div id="menuContainer"></div>
</div>

<div class="summary-panel">
<div class="summary-brand">Food Kiosk Preorder</div>

<div class="customer-panel">
<label class="field-label" for="name">Customer name</label>
<input id="name" type="text" autocomplete="name" placeholder="Enter name">

<label class="field-label" for="timeSelect">Delivery time</label>
<select id="timeSelect">
<option value="">-- Select Time --</option>
</select>
<input id="time" type="hidden">
<span id="summaryTime" class="hidden">--</span>
</div>

<h3 id="summaryTitle">Order Summary</h3>

<div id="liveSummary">No items yet</div>

<div class="summary-total">
Total P<span id="liveTotal">0</span>
</div>

<button id="orderBtn" disabled onclick="openSummary()">Send Order</button>
</div>
</div>

<script src="/app.js?v=20260516-customer-panel"></script>
</body>
</html>
