<!DOCTYPE html>
<html>
<head>
<title>Cashier Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/styles.css?v=20260517-cash-presets-visible">
</head>
<body>
<div class="page">
<div class="main">
<div id="menuContainer"></div>
</div>

<div class="summary-panel">
<div class="summary-brand">Cashier</div>

<h3 id="summaryTitle">Order Summary</h3>

<div id="liveSummary">No items yet</div>

<div class="summary-total">
Total P<span id="liveTotal">0</span>
</div>

<div class="cash-panel hidden">
<label class="cash-field" for="cashInput">
<span>Cash</span>
<span class="cash-value"><input id="cashInput" type="number" min="0" step="1" inputmode="numeric" value=""></span>
</label>
<label class="cash-field" for="changeOutput">
<span>Change</span>
<input id="changeOutput" type="text" readonly value="0">
</label>
<div class="cash-presets">
<button id="exactCashBtn" type="button" onclick="setExactCashAmount()">P0</button>
<button type="button" onclick="setCashAmount(500)">P500</button>
<button type="button" onclick="setCashAmount(1000)">P1000</button>
</div>
</div>

<button id="orderBtn" disabled data-ready-text="Send Order" onclick="openSummary()">Send Order</button>
</div>
</div>

<div id="customerStatus" class="customer-status hidden">
<strong id="customerStatusTitle">Order Status</strong>
<p id="customerStatusText">Your order status will appear here.</p>
</div>

<script src="/app.js?v=20260517-change-no-prefix"></script>
</body>
</html>
