services:
  - type: web
    name: bis1
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pos-roadworthy-db
          property: connectionString
      - key: PANTANAN_WHATSAPP_LINK
        value: https://wa.me/639695093050
      - key: PANTANAN_MESSENGER_LINK
        value: https://facebook.com/alexander.moreno.2929
      - key: TEACHER_USERNAME
        value: alexander.moreno
      - key: TEACHER_PIN
        value: "1111"
      - key: TEACHER_SESSION_SECRET
        generateValue: true
  - type: web
    name: foodkiosk2
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_NAMESPACE
        value: foodkiosk2
      - key: DATABASE_URL
        fromDatabase:
          name: pos-roadworthy-db
          property: connectionString
      - key: PANTANAN_WHATSAPP_LINK
        value: https://wa.me/639695093050
      - key: PANTANAN_MESSENGER_LINK
        value: https://facebook.com/alexander.moreno.2929

databases:
  - name: pos-roadworthy-db
    databaseName: pos_roadworthy
    user: pos_roadworthy
    region: oregon
    plan: free
