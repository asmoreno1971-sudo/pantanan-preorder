<!DOCTYPE html>
<html>
<head>
<title>Roadworthy Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
if(["foodkiosk1.onrender.com", "bis1.onrender.com"].includes(window.location.hostname.toLowerCase())){
  document.documentElement.classList.add("customer-calculator-only");
}
</script>
<style>
.customer-calculator-only .customer-panel,
.customer-calculator-only #orderBtn,
.customer-calculator-only #customerStatus,
.customer-calculator-only #kioskClosedMessage{
  display:none !important;
}
</style>
<link rel="stylesheet" href="/styles.css?v=20260523-readable-status">
</head>
<body>
<div class="page">
<div class="main">
<div id="menuContainer"></div>
</div>

<div class="summary-panel">
<div class="summary-brand">Food Kiosk - Roadworthy</div>

<div class="customer-panel">
<label class="field-label" for="timeSelect">Expected Pickup Time:</label>
<div class="time-picker-wrap">
<select id="timeSelect" aria-label="Choose pickup time"></select>
<span class="time-picker-icon" aria-hidden="true">◷</span>
</div>
<input id="time" type="hidden">
<span id="summaryTime" class="hidden">--</span>
</div>

<h3 id="summaryTitle">Order Summary</h3>

<div id="liveSummary">No items yet</div>

<div class="summary-total">
Total P<span id="liveTotal">0</span>
</div>

<button id="orderBtn" disabled onclick="openSummary()">Send Order</button>
<div id="kioskClosedMessage" class="kiosk-closed-message hidden"></div>
</div>
</div>

<div id="customerStatus" class="customer-status hidden">
<strong id="customerStatusTitle">Order Status</strong>
<p id="customerStatusText">Your order status will appear here.</p>
</div>

<script src="/app.js?v=20260607-customer-host-mode"></script>
</body>
</html>
