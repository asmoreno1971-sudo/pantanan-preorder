<!DOCTYPE html>
<html>
<head>
<title>Preorder Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page">
<div class="main">
<h3>Preorder Menu</h3>

<input
id="name"
name="nickname"
placeholder="Your Nickname"
maxlength="10"
autocomplete="nickname"
autocapitalize="characters"
style="text-transform:uppercase;">

<label class="field-label" for="contact">WhatsApp / Viber No.</label>
<input
id="contact"
name="tel"
type="tel"
inputmode="tel"
autocomplete="tel"
placeholder="Contact Number">

<h4>Available Time</h4>
<select id="timeSelect">
<option value="">-- Select Time --</option>
</select>
<input type="hidden" id="time">

<div id="menuContainer"></div>
</div>

<div class="summary-panel">
<div class="summary-brand">Pantanan</div>
<div id="nowTime" class="current-time"></div>
<h3 id="summaryTitle">Order Summary</h3>

<div class="summary-time">
Order available at:
<br><strong><span id="summaryTime">--</span></strong>
</div>

<div id="liveSummary">No items yet</div>

<div class="summary-total">
Total P<span id="liveTotal">0</span>
</div>

<button id="orderBtn" onclick="openSummary()">Place Order</button>
</div>
</div>

<div id="customerStatus" class="customer-status hidden">
<button class="status-close" onclick="dismissCustomerStatus()" aria-label="Close order status">x</button>
<strong id="customerStatusTitle">Order status</strong>
<p id="customerStatusText"></p>
</div>

<div id="successModal" class="modal-backdrop">
<div class="modal">
<h3 id="successTitle">Order sent</h3>
<p id="successText">Your order has been sent. Please wait for kitchen confirmation.</p>
<div class="modal-actions">
<button class="secondary-btn" onclick="closeSuccessModal()">View Order Status</button>
<button onclick="location.reload()">Start New Order</button>
</div>
</div>
</div>

<script src="/app.js?v=20260509-mobile-autofill"></script>
</body>
</html>
