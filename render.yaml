services:
  - type: web
    name: pos-roadworthy
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pos-roadworthy-db-va
          property: connectionString
      - key: PANTANAN_WHATSAPP_LINK
        value: https://wa.me/639695093050
      - key: PANTANAN_MESSENGER_LINK
        value: https://facebook.com/alexander.moreno.2929

databases:
  - name: pos-roadworthy-db-va
    databaseName: pos_roadworthy
    user: pos_roadworthy
    region: virginia
    plan: free
