<!DOCTYPE html>
<html>
<head>
<title>Daily Sales</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/styles.css?v=20260522-sales-profit-top">
</head>
<body>
<div class="sales-shell">
<div class="sales-top">
<div>
<h3>Daily Sales</h3>
<p class="admin-help">Completed customer orders and POS sales.</p>
</div>
<div class="sales-links">
<a class="admin-action-add" href="/admin">Admin</a>
<a class="admin-action-sales" href="/expenses">Expenses</a>
<a class="admin-action-transactions" href="/transactions.html">Transactions</a>
<a class="admin-action-kitchen" href="/kitchen">Kitchen</a>
<a class="admin-action-cashier" href="/cashier">Cashier</a>
<a class="admin-action-customer" href="/">Customer</a>
</div>
</div>

<div id="salesPanel" class="sales-panel">
<section class="profit-panel" aria-label="Sales profit summary">
<div class="profit-head">
<div>
<h4>Profit Summary</h4>
<p id="profitPeriodLabel">Today</p>
</div>
<div class="period-tabs" aria-label="Profit period">
<button type="button" data-profit-period="day" onclick="setProfitPeriod('day')">Day</button>
<button type="button" data-profit-period="week" onclick="setProfitPeriod('week')">Week</button>
<button type="button" data-profit-period="month" onclick="setProfitPeriod('month')">Month</button>
<button type="button" data-profit-period="all" onclick="setProfitPeriod('all')">All</button>
</div>
</div>
<div class="profit-grid">
<div class="profit-card profit-sales">
<small>Sales</small>
<span>P <b id="profitSales">0</b></span>
</div>
<div class="profit-card profit-expenses">
<small>Expenses</small>
<span>P <b id="profitExpenses">0</b></span>
</div>
<div class="profit-card profit-net">
<small>Net Profit</small>
<span>P <b id="profitNet">0</b></span>
</div>
</div>
<div class="sales-sheet-wrap profit-expense-wrap">
<table class="sales-sheet profit-expense-sheet">
<thead>
<tr>
<th>Date</th>
<th>Items</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="profitExpenseRows">
<tr><td colspan="3">No expenses yet</td></tr>
</tbody>
</table>
</div>
<div class="profit-actions">
<span id="profitStatus" class="status"></span>
</div>
</section>

<div class="sales-toolbar">
<label for="salesDate">Date</label>
<input id="salesDate" type="date" onchange="loadSales()">
<span id="salesStatus" class="status"></span>
</div>

<div class="sales-sheet-wrap">
<table class="sales-sheet daily-sales-sheet">
<thead>
<tr>
<th id="salesDateLabel">Today</th>
<th>Frq</th>
<th>P <span id="salesGrandTotal">0</span></th>
</tr>
</thead>
<tbody id="salesRows">
<tr><td colspan="3">No sales yet</td></tr>
</tbody>
</table>
</div>
</div>
</div>

<script src="/sales.js?v=20260522-sales-profit-top"></script>
</body>
</html>
