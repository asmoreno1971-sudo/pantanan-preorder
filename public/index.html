<!DOCTYPE html>
<html>
<head>
<title>Preorder Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page">
<div class="main">
<div id="menuContainer"></div>
</div>

<div class="summary-panel">
<div class="summary-brand">POS Roadworthy</div>
<div id="nowTime" class="current-time"></div>
<h3 id="summaryTitle">Order Summary</h3>

<div id="liveSummary">No items yet</div>

<div class="summary-total">
Total P<span id="liveTotal">0</span>
</div>

<div class="cash-panel">
<label class="cash-field">
Cash
<input id="cashInput" type="number" min="0" step="1" inputmode="numeric" placeholder="0">
</label>
<div class="cash-presets" aria-label="Cash presets">
<button type="button" onclick="setCashAmount(500)">P500</button>
<button type="button" onclick="setCashAmount(1000)">P1000</button>
</div>
<label class="cash-field">
Change
<input id="changeOutput" type="text" value="P0" readonly>
</label>
</div>

<button id="orderBtn" disabled onclick="openSummary()">Pay</button>
</div>
</div>

<script src="/app.js?v=20260509-cash-presets"></script>
</body>
</html>
