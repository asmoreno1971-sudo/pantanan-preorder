<!DOCTYPE html>
<html>
<head>
<title>Kitchen Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/styles.css?v=20260522-one-kitchen-button">
</head>
<body>
<div id="kitchenLoginPanel" class="admin-panel kitchen-login-panel">
<h4>Kitchen Login</h4>
<input id="kitchenPassword" type="password" placeholder="Kitchen password">
<button onclick="loginKitchen()">Login</button>
<span id="kitchenLoginStatus" class="status"></span>
</div>

<div id="kitchenPanel" class="kitchen-shell hidden">
<div class="kitchen-top">
<div>
<h3>Kitchen Orders</h3>
<p class="kitchen-subtitle">Live order queue</p>
</div>
<div class="printer-control">
<button id="printerBtn" type="button" onclick="connectKitchenPrinter()">Connect Printer</button>
<span id="printerStatus">Printer not connected</span>
</div>
</div>
<nav class="admin-action-boxes kitchen-shortcuts" aria-label="Kitchen shortcuts">
<a class="admin-action-box admin-action-add" href="/admin">
<span>Add Product</span>
</a>
<a class="admin-action-box admin-action-sales" href="/sales">
<span>Sales</span>
</a>
<a class="admin-action-box admin-action-cashier" href="/admin">
<span>Admin</span>
</a>
<a class="admin-action-box admin-action-transactions" href="/transactions">
<span>Transactions</span>
</a>
<a class="admin-action-box admin-action-customer" href="/">
<span>Customer</span>
</a>
</nav>
<div id="ordersContainer" class="kitchen-board"></div>
</div>

<div id="messageModal" class="modal-backdrop">
<div class="modal">
<h3>Pantanan Kiosk</h3>
<p id="messageContact"></p>
<textarea id="messageText" class="message-text" readonly></textarea>
<div class="modal-actions">
<button class="secondary-btn" onclick="closeMessageModal()">Close</button>
</div>
</div>
</div>

<script src="/kitchen.js?v=20260522-one-kitchen-button"></script>
</body>
</html>
