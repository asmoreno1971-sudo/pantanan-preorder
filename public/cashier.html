<!DOCTYPE html>
<html>
<head>
<title>Cashier Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="/page-auth.js?v=20260522-password-1111"></script>
<link rel="stylesheet" href="/styles.css?v=20260523-cashier-no-status">
</head>
<body>
<div class="page">
<div class="main">
<div id="menuContainer"></div>
</div>

<div class="summary-panel">
<div class="summary-brand">Food Kiosk - Roadworthy</div>

<h3 id="summaryTitle">Order Summary</h3>

<div id="liveSummary">No items yet</div>

<div class="summary-total">
Total P<span id="liveTotal">0</span>
</div>

<div class="cash-panel hidden">
<label class="cash-field" for="cashInput">
<span>Cash</span>
<span class="cash-value"><input id="cashInput" type="number" min="0" step="1" inputmode="numeric" value=""></span>
</label>
<label class="cash-field" for="changeOutput">
<span>Change</span>
<input id="changeOutput" type="text" readonly value="0">
</label>
<div class="cash-presets">
<button type="button" onclick="setCashAmount(500)">P500</button>
<button type="button" onclick="setCashAmount(1000)">P1000</button>
</div>
</div>

<button id="orderBtn" disabled data-ready-text="Send Order" onclick="openSummary()">Send Order</button>

<nav class="admin-action-boxes cashier-shortcuts" aria-label="Cashier shortcuts">
<a class="admin-action-box admin-action-sales" href="/sales">
<span>Sales</span>
</a>
<a class="admin-action-box admin-action-expenses" href="/expenses">
<span>Expenses</span>
</a>
<a class="admin-action-box admin-action-kitchen" href="/kitchen">
<span>Kitchen</span>
</a>
<a class="admin-action-box admin-action-add" href="/admin">
<span>Admin</span>
</a>
<a class="admin-action-box admin-action-transactions" href="/transactions">
<span>Transactions</span>
</a>
<a class="admin-action-box admin-action-customer" href="/customer">
<span>Customer</span>
</a>
</nav>
</div>
</div>

<script src="/app.js?v=20260519-storage-ready-refresh"></script>
</body>
</html>
